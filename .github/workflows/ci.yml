name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test py${{ matrix.python-version }}${{ matrix.xacro && format(' · xacro {0}', matrix.xacro) || '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # `xacro` is the most fragile dependency (importer.py patches its
        # internals), so guard the lowest supported pin (the floor of the
        # `xacro>=2.1` requirement) on one job in addition to latest.
        include:
          - python-version: "3.12"
            xacro: "2.1.0"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # graphviz `dot` for the tree renderer, and Mesa's software EGL stack so
      # the mesh renderer (render_pose_mesh) has a headless GL backend and runs
      # offscreen instead of skipping. Both renderer test groups skip without
      # these. EGL+llvmpipe is more reliable on CI than Ubuntu's stock OSMesa.
      - name: Install graphviz + Mesa EGL (headless GL)
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz \
            libegl1 libgles2 libgl1-mesa-dri libglvnd0 libgbm1

      - name: Install package (with all extras + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pin xacro (matrix override)
        if: ${{ matrix.xacro }}
        run: pip install "xacro==${{ matrix.xacro }}"

      - name: Show resolved versions
        run: pip show xacro numpy scipy networkx pydantic | grep -E "^(Name|Version)"

      - name: Run tests
        env:
          # Drive render_pose_mesh's offscreen path through Mesa's surfaceless
          # software EGL (no GPU/display on the runner). The renderer reads this.
          FIELDPILOT_URDF_RENDER_BACKEND: egl
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: pytest -q -rs

  build:
    name: build & check distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Validate metadata
        run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
