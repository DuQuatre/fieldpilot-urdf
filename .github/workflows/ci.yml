name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test py${{ matrix.python-version }}${{ matrix.xacro && format(' · xacro {0}', matrix.xacro) || '' }}
    runs-on: ubuntu-latest
    # The whole job runs in minutes; cap it well under GitHub's 6h default so a
    # stalled apt mirror (see the install step) fails fast and is re-runnable
    # instead of burning hours of runner time.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # `xacro` is the most fragile dependency (importer.py patches its
        # internals), so guard the lowest supported pin (the floor of the
        # `xacro>=2.1` requirement) on one job in addition to latest.
        include:
          - python-version: "3.12"
            xacro: "2.1.0"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # graphviz `dot` for the tree renderer, and Mesa's software EGL stack so
      # the mesh renderer (render_pose_mesh) has a headless GL backend and runs
      # offscreen instead of skipping. Both renderer test groups skip without
      # these. EGL+llvmpipe is more reliable on CI than Ubuntu's stock OSMesa.
      - name: Install graphviz + Mesa EGL (headless GL)
        env:
          DEBIAN_FRONTEND: noninteractive
        # Bound apt against flaky Ubuntu mirrors: a per-connection timeout makes
        # a stalled mirror error out in seconds (not hang until the job ceiling)
        # and retries ride out transient failures.
        run: |
          APT_OPTS="-o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30"
          sudo apt-get update $APT_OPTS
          sudo apt-get install -y $APT_OPTS graphviz \
            libegl1 libgles2 libgl1-mesa-dri libglvnd0 libgbm1

      - name: Install package (with all extras + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pin xacro (matrix override)
        if: ${{ matrix.xacro }}
        run: pip install "xacro==${{ matrix.xacro }}"

      - name: Show resolved versions
        run: pip show xacro numpy scipy networkx pydantic | grep -E "^(Name|Version)"

      - name: Run tests
        env:
          # Drive render_pose_mesh's offscreen path through Mesa's surfaceless
          # software EGL (no GPU/display on the runner). The renderer reads this.
          FIELDPILOT_URDF_RENDER_BACKEND: egl
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: pytest -q -rs

      # The bundled examples are part of the docs (full_stack_tour.py backs the
      # tutorial). Smoke-run them so a broken example fails CI, not a user. All
      # three are offline + deterministic; with [dev] installed, full_stack_tour
      # exercises the [dynamics] and [sim] layers too.
      - name: Run examples
        run: |
          python examples/ducky_diagnosis.py
          python examples/closed_loop_sim.py
          python examples/full_stack_tour.py

  build:
    name: build & check distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Validate metadata
        run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
